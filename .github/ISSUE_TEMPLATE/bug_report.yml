name: 🐛 Bug Report
description: 报告一个 bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地说明 bug 是什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开应用
        2. 点击 ...
        3. 出现 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 日志

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 'v2.0.0'
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: AI 提供商（如果与对话功能相关）
      placeholder: 'OpenAI / Anthropic / Gemini / DeepSeek 等'
