name: 💡 Feature Request
description: 提一个新需求或改进建议
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 描述当前痛点或缺失
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你的方案
      description: 希望应用怎么做

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的其他方案

  - type: textarea
    id: extra
    attributes:
      label: 补充说明 / 截图 / 链接
